name: Crawl ITviec

on:
  # 00:00 UTC = 07:00 ICT mỗi ngày
  schedule:
    - cron: '0 0 * * *'
  # Cho phép chạy thủ công từ Actions tab
  workflow_dispatch:
    inputs:
      target:
        description: 'Crawl target'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - jobs
          - companies

permissions:
  contents: write

# Không chạy song song: tránh race condition khi push
concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  # ══════════════════════════════════════════════════════
  # Job 1: Crawl danh sách jobs
  # ══════════════════════════════════════════════════════
  scrape-jobs:
    name: 🔍 Crawl Jobs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event_name == 'schedule' || github.event.inputs.target == 'both' || github.event.inputs.target == 'jobs' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Inject login cookies
        env:
          COOKIES_RAW: ${{ secrets.ITVIEC_COOKIES_RAW }}
        run: |
          if [ -n "$COOKIES_RAW" ]; then
            printf '%s' "$COOKIES_RAW" > cookies-raw.txt
            node build-cookies.js
            echo "✓ Cookies injected"
          else
            echo "⚠ No ITVIEC_COOKIES_RAW secret — salary sẽ bị ẩn."
          fi

      - name: Remove old job state (fresh crawl every run)
        run: rm -f itviec-state.json

      - name: Crawl jobs
        run: node scraper.js

      - name: Upload itviec-jobs.json artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: itviec-jobs
          path: itviec-jobs.json
          retention-days: 7
          if-no-files-found: error

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-debug-${{ github.run_id }}
          path: |
            itviec-state.json
            itviec-jobs.json
          if-no-files-found: ignore
          retention-days: 7

  # ══════════════════════════════════════════════════════
  # Job 2: Crawl danh sách công ty
  # ══════════════════════════════════════════════════════
  scrape-companies:
    name: 🏢 Crawl Companies
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'schedule' || github.event.inputs.target == 'both' || github.event.inputs.target == 'companies' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Inject login cookies (optional)
        env:
          COOKIES_RAW: ${{ secrets.ITVIEC_COOKIES_RAW }}
        run: |
          if [ -n "$COOKIES_RAW" ]; then
            printf '%s' "$COOKIES_RAW" > cookies-raw.txt
            node build-cookies.js
            echo "✓ Cookies injected"
          else
            echo "⚠ No cookies — sẽ crawl ẩn danh."
          fi

      - name: Remove old company state (fresh crawl every run)
        run: rm -f itviec-companies-state.json

      - name: Crawl companies
        run: node company-scraper.js

      - name: Upload itviec-companies.json artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: itviec-companies
          path: itviec-companies.json
          retention-days: 7
          if-no-files-found: error

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: companies-debug-${{ github.run_id }}
          path: |
            itviec-companies-state.json
            itviec-companies.json
          if-no-files-found: ignore
          retention-days: 7

  # ══════════════════════════════════════════════════════
  # Job 3: Commit tất cả file JSON đã crawl vào repo
  # Chỉ chạy sau khi ít nhất 1 scrape job thành công.
  # Nếu commit fail → Re-run failed jobs trong Actions tab
  # (không cần scrape lại).
  # ══════════════════════════════════════════════════════
  commit:
    name: 💾 Commit & Push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scrape-jobs, scrape-companies]
    # Chạy khi ít nhất 1 trong 2 scrape jobs thành công (hoặc bị skip)
    if: |
      always() &&
      (needs.scrape-jobs.result == 'success' || needs.scrape-companies.result == 'success')

    steps:
      - uses: actions/checkout@v4

      - name: Download itviec-jobs.json
        if: needs.scrape-jobs.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: itviec-jobs

      - name: Download itviec-companies.json
        if: needs.scrape-companies.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: itviec-companies

      - name: Commit & push with retry
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Kiểm tra có thay đổi không
          CHANGED=$(git status --porcelain itviec-jobs.json itviec-companies.json 2>/dev/null)
          if [ -z "$CHANGED" ]; then
            echo "ℹ No changes detected — nothing to commit."
            exit 0
          fi

          git add itviec-jobs.json itviec-companies.json 2>/dev/null || true
          git commit -m "chore: crawl $(date -u +%Y-%m-%d) [skip ci]"

          # Push với retry (tránh race condition khi có push khác)
          for i in 1 2 3; do
            echo "=== Push attempt $i ==="
            git fetch origin main
            if git pull --rebase origin main && git push; then
              echo "✓ Pushed successfully (attempt $i)"
              exit 0
            fi
            echo "⚠ Attempt $i failed, retrying in 8s..."
            sleep 8
          done

          echo "::error::Failed to push after 3 attempts. Re-run this job when clear."
          exit 1
