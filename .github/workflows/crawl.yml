name: Crawl ITviec jobs

on:
  # 00:00 UTC = 07:00 ICT (Asia/Ho_Chi_Minh) mỗi ngày
  schedule:
    - cron: '0 0 * * *'
  # Manual trigger: Actions tab → Crawl ITviec jobs → Run workflow
  workflow_dispatch:

permissions:
  contents: write  # cần để commit + push itviec-jobs.json

# Không chạy song song nếu user bấm Run workflow khi còn run khác đang chạy
concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # Optional: inject login cookies từ secret ITVIEC_COOKIES_RAW (raw Cookie header).
      # Không set secret → scrape không login, salary sẽ là "Sign in to view salary".
      - name: Inject login cookies
        env:
          COOKIES_RAW: ${{ secrets.ITVIEC_COOKIES_RAW }}
        run: |
          if [ -n "$COOKIES_RAW" ]; then
            printf '%s' "$COOKIES_RAW" > cookies-raw.txt
            node build-cookies.js
            echo "✓ Cookies loaded"
          else
            echo "⚠ No ITVIEC_COOKIES_RAW secret — scraping không login, salary sẽ bị ẩn."
          fi

      # Luôn fresh scrape trên CI — không dùng resume từ state file cũ
      - name: Ensure fresh state
        run: rm -f itviec-state.json

      - name: Crawl
        run: node scraper.js

      - name: Commit updated jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain itviec-jobs.json)" ]; then
            git add itviec-jobs.json
            git commit -m "chore: crawl $(date -u +%Y-%m-%d) [skip ci]"
            # Rebase trước khi push: user có thể đã push commit khác lên main
            # trong ~20 phút crawl chạy. Retry 3 lần nếu vẫn race.
            for i in 1 2 3; do
              git pull --rebase origin main && git push && { echo "✓ Pushed (attempt $i)"; exit 0; }
              echo "Attempt $i failed, retry in 5s..."
              sleep 5
            done
            echo "::error::Failed to push after 3 attempts"
            exit 1
          else
            echo "No changes in itviec-jobs.json, nothing to commit."
          fi

      # Upload debug artifacts khi fail để debug offline
      - name: Upload state file on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-debug-${{ github.run_id }}
          path: |
            itviec-state.json
            itviec-jobs.json
          if-no-files-found: ignore
          retention-days: 7
